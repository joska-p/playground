image: node:24.15.0

cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store
    - .turbo

before_script:
  # Corepack will use the "packageManager" field to install pnpm@10.19.0
  - corepack enable
  - corepack prepare
  - pnpm config set store-dir .pnpm-store

pages:
  stage: deploy
  script:
    - pnpm install

    # Executes: pnpm build && mkdir ... && cp -r storybook
    - pnpm run deploy:vercel

    # Matches your astro.config.mjs logic:
    # Moves the dist folder to 'public' so GitLab hosts it correctly.
    - mv ./apps/playground/dist public

  artifacts:
    paths:
      - public
  rules:
    # Triggers on push to main or develop
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"
