<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 120" width="820" height="120">
  <defs>
    <style>
      :root, svg {
        --background:           oklch(0.239 0.004 219.659);
        --foreground:           oklch(0.822 0.051 84.515);
        --muted-foreground:     oklch(0.749 0.042 81.345);
        --border:               oklch(0.409 0.011 50.327);
        --secondary:            oklch(0.639 0.131 108.548);
        --accent:               oklch(0.59  0.111 351.672);
        --primary:              oklch(0.691 0.04  169.812);
        --destructive:          oklch(0.539 0.201 28.478);
        --category-generative:  oklch(0.644 0.1   168.409);
        --ring:                 oklch(0.862 0.135 84.271);
      }
      .bg          { fill: var(--background,           #1d2021); }
      .fg          { fill: var(--foreground,            #ebdbb2); }
      .arrow       { stroke: var(--border,              #6b6456); }
      .op          { fill: var(--muted-foreground,      #a89984); }
      .tagline     { fill: var(--muted-foreground,      #a89984); }
      .dot-gold    { fill: var(--ring,                  #fabd2f); }
      .label-N     { fill: var(--secondary,             #b8bb26); }
      .label-Z     { fill: var(--accent,                #d3869b); }
      .label-Q     { fill: var(--primary,               #83a598); }
      .label-R     { fill: var(--destructive,           #fe8019); }
      .label-C     { fill: var(--category-generative,   #8ec07c); }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 2L8 5L1 8" fill="none" stroke="var(--border, #6b6456)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="120" class="bg" rx="0"/>

  <!-- Colored accent bars -->
  <rect x="216" y="96" width="28" height="3" rx="1.5" class="label-N"/>
  <rect x="342" y="96" width="28" height="3" rx="1.5" class="label-Z"/>
  <rect x="468" y="96" width="28" height="3" rx="1.5" class="label-Q"/>
  <rect x="594" y="96" width="28" height="3" rx="1.5" class="label-R"/>
  <rect x="720" y="96" width="28" height="3" rx="1.5" class="label-C"/>

  <!-- 1 -->
  <text x="60" y="80" font-family="'EB Garamond', Georgia, serif" font-size="38" font-weight="600"
        class="fg" text-anchor="middle">1</text>
  <circle cx="60" cy="55" r="4" class="dot-gold" opacity="0.5"/>

  <!-- Arrow 1 → ℕ -->
  <line x1="83" y1="60" x2="188" y2="60" class="arrow" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="135" y="50" font-family="'EB Garamond', Georgia, serif" font-size="17" font-style="italic"
        class="op" text-anchor="middle">+</text>

  <!-- ℕ -->
  <text x="216" y="80" font-family="'EB Garamond', Georgia, serif" font-size="38" font-weight="600"
        class="label-N" text-anchor="middle">ℕ</text>

  <!-- Arrow ℕ → ℤ -->
  <line x1="240" y1="60" x2="313" y2="60" class="arrow" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="277" y="50" font-family="'EB Garamond', Georgia, serif" font-size="17" font-style="italic"
        class="op" text-anchor="middle">−</text>

  <!-- ℤ -->
  <text x="342" y="80" font-family="'EB Garamond', Georgia, serif" font-size="38" font-weight="600"
        class="label-Z" text-anchor="middle">ℤ</text>

  <!-- Arrow ℤ → ℚ -->
  <line x1="366" y1="60" x2="438" y2="60" class="arrow" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="402" y="50" font-family="'EB Garamond', Georgia, serif" font-size="17" font-style="italic"
        class="op" text-anchor="middle">÷</text>

  <!-- ℚ -->
  <text x="468" y="80" font-family="'EB Garamond', Georgia, serif" font-size="38" font-weight="600"
        class="label-Q" text-anchor="middle">ℚ</text>

  <!-- Arrow ℚ → ℝ -->
  <line x1="493" y1="60" x2="563" y2="60" class="arrow" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="528" y="52" font-family="'EB Garamond', Georgia, serif" font-size="17" font-style="italic"
        class="op" text-anchor="middle">√</text>

  <!-- ℝ -->
  <text x="594" y="80" font-family="'EB Garamond', Georgia, serif" font-size="38" font-weight="600"
        class="label-R" text-anchor="middle">ℝ</text>

  <!-- Arrow ℝ → ℂ -->
  <line x1="619" y1="60" x2="690" y2="60" class="arrow" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="654" y="48" font-family="'EB Garamond', Georgia, serif" font-size="17" font-style="italic"
        class="op" text-anchor="middle">√−1</text>

  <!-- ℂ -->
  <text x="734" y="80" font-family="'EB Garamond', Georgia, serif" font-size="38" font-weight="600"
        class="label-C" text-anchor="middle">ℂ</text>

  <!-- Tagline -->
  <text x="796" y="80" font-family="'EB Garamond', Georgia, serif" font-size="13" font-style="italic"
        class="tagline" text-anchor="end" opacity="0.7">the expansion of numbers</text>
</svg>
