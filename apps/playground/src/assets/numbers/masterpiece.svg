<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100">
  <defs>
    <style>
      :root, svg {
        --background:           oklch(0.239 0.004 219.659);
        --foreground:           oklch(0.822 0.051 84.515);
        --muted-foreground:     oklch(0.749 0.042 81.345);
        --border:               oklch(0.409 0.011 50.327);
        --secondary:            oklch(0.639 0.131 108.548);
        --accent:               oklch(0.59  0.111 351.672);
        --primary:              oklch(0.691 0.04  169.812);
        --destructive:          oklch(0.539 0.201 28.478);
        --category-generative:  oklch(0.644 0.1   168.409);
        --ring:                 oklch(0.862 0.135 84.271);
        --card:                 oklch(0.311 0.003 48.623);
      }
      /* Semantic aliases matching the gruvbox palette */
      .bg          { fill:   var(--background,           #1d2021); }
      .fg          { fill:   var(--foreground,            #ebdbb2); }
      .fg-muted    { fill:   var(--muted-foreground,      #a89984); }
      .border-rule { fill:   var(--border,                #504945); }
      .border-dim  { fill:   var(--card,                  #3c3836); }
      .border-deep { fill:   var(--card,                  #282828); }
      .crisis      { fill:   var(--card,                  #665c54); }
      .arrow-line  { stroke: var(--border,                #504945); }
      .arrow-dim   { stroke: var(--card,                  #504945); }

      .col-N       { fill:   var(--secondary,             #b8bb26); }
      .col-Z       { fill:   var(--accent,                #d3869b); }
      .col-Q       { fill:   var(--primary,               #83a598); }
      .col-R       { fill:   var(--destructive,           #fe8019); }
      .col-C       { fill:   var(--category-generative,   #8ec07c); }
      .col-gold    { fill:   var(--ring,                  #fabd2f); }
      .col-R-s     { stroke: var(--destructive,           #fe8019); }
      .col-Q-s     { stroke: var(--primary,               #83a598); }
      .col-N-s     { stroke: var(--secondary,             #b8bb26); }
      .col-Z-s     { stroke: var(--accent,                #d3869b); }
      .col-C-s     { stroke: var(--category-generative,   #8ec07c); }
    </style>

    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" class="fg" opacity="0.07"/>
    </pattern>

    <!-- Glows for number fields -->
    <radialGradient id="gN" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="var(--secondary,   #b8bb26)" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="var(--secondary,   #b8bb26)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gZ" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="var(--accent,      #d3869b)" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="var(--accent,      #d3869b)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gQ" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="var(--primary,     #83a598)" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="var(--primary,     #83a598)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gR" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="var(--destructive, #fe8019)" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="var(--destructive, #fe8019)" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gC" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="var(--category-generative, #8ec07c)" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="var(--category-generative, #8ec07c)" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="realLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="var(--primary,     #83a598)" stop-opacity="0.3"/>
      <stop offset="40%"  stop-color="var(--destructive, #fe8019)" stop-opacity="0.5"/>
      <stop offset="60%"  stop-color="var(--destructive, #fe8019)" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="var(--destructive, #fe8019)" stop-opacity="0.2"/>
    </linearGradient>

    <marker id="arrd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 2L8 5L1 8" fill="none" stroke="var(--border, #665c54)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M1 2L8 5L1 8" fill="none" stroke="var(--card, #504945)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="1100" class="bg"/>
  <rect width="800" height="1100" fill="url(#dots)"/>

  <!-- Top border rule -->
  <rect x="60" y="40"  width="680" height="1"   class="border-rule"/>
  <rect x="60" y="42"  width="680" height="0.5" class="border-dim"/>

  <!-- TITLE BLOCK -->
  <text x="400" y="90"  font-family="'EB Garamond', Georgia, serif" font-size="13" letter-spacing="6"
        class="fg-muted" text-anchor="middle">THE EXPANSION OF NUMBERS</text>
  <text x="400" y="130" font-family="'EB Garamond', Georgia, serif" font-size="46" font-weight="600"
        class="fg" text-anchor="middle">1 → ℕ → ℤ → ℚ → ℝ → ℂ</text>
  <text x="400" y="160" font-family="'EB Garamond', Georgia, serif" font-size="15" font-style="italic"
        class="fg-muted" text-anchor="middle">Each step: an operation breaks, a new universe is born</text>

  <!-- Divider -->
  <rect x="60" y="178" width="680" height="0.5" class="border-dim"/>

  <!-- ═══════════════════════════════════════════
       SECTION 1 — ℕ Natural Numbers
  ═══════════════════════════════════════════ -->
  <ellipse cx="130" cy="250" rx="70" ry="50" fill="url(#gN)"/>
  <text x="100" y="280" font-family="'EB Garamond', Georgia, serif" font-size="72" font-weight="600"
        class="col-N" text-anchor="middle" opacity="0.9">ℕ</text>
  <rect x="148" y="230" width="42" height="18" rx="9" class="col-N" opacity="0.18"/>
  <text x="169" y="243" font-family="'EB Garamond', Georgia, serif" font-size="10"
        class="col-N" text-anchor="middle">+</text>
  <text x="210" y="250" font-family="'EB Garamond', Georgia, serif" font-size="22" font-weight="600"
        class="fg">Natural Numbers</text>
  <text x="210" y="272" font-family="'EB Garamond', Georgia, serif" font-size="14" font-style="italic"
        class="fg-muted">{ 1, 2, 3, 4, 5, … }</text>
  <text x="210" y="292" font-family="'EB Garamond', Georgia, serif" font-size="13"
        class="crisis">Born from counting. The oldest numbers.</text>

  <!-- Number line — ℕ -->
  <line x1="210" y1="320" x2="740" y2="320" stroke="var(--card, #3c3836)" stroke-width="1"/>
  <line x1="210" y1="320" x2="720" y2="320" class="col-N-s" stroke-width="1" opacity="0.4"/>
  <g font-family="'EB Garamond', Georgia, serif" font-size="12" class="col-N" text-anchor="middle">
    <circle cx="210" cy="320" r="4" class="col-N"/>
    <text x="210" y="338">1</text>
    <circle cx="280" cy="320" r="4" class="col-N"/>
    <text x="280" y="338">2</text>
    <circle cx="350" cy="320" r="4" class="col-N"/>
    <text x="350" y="338">3</text>
    <circle cx="420" cy="320" r="4" class="col-N"/>
    <text x="420" y="338">4</text>
    <circle cx="490" cy="320" r="4" class="col-N"/>
    <text x="490" y="338">5</text>
    <text x="580" y="316" font-size="18" opacity="0.5">···</text>
    <text x="720" y="316" font-size="14" opacity="0.6">+∞</text>
  </g>
  <text x="400" y="365" font-family="'EB Garamond', Georgia, serif" font-size="12" font-style="italic"
        class="crisis" text-anchor="middle">Crisis: 3 − 5 = ?  ↓</text>
  <line x1="400" y1="372" x2="400" y2="392" stroke="var(--card, #504945)" stroke-width="1" marker-end="url(#arrc)"/>

  <!-- ═══════════════════════════════════════════
       SECTION 2 — ℤ Integers
  ═══════════════════════════════════════════ -->
  <ellipse cx="130" cy="440" rx="70" ry="50" fill="url(#gZ)"/>
  <text x="100" y="470" font-family="'EB Garamond', Georgia, serif" font-size="72" font-weight="600"
        class="col-Z" text-anchor="middle" opacity="0.9">ℤ</text>
  <rect x="148" y="420" width="42" height="18" rx="9" class="col-Z" opacity="0.18"/>
  <text x="169" y="433" font-family="'EB Garamond', Georgia, serif" font-size="10"
        class="col-Z" text-anchor="middle">−</text>
  <text x="210" y="440" font-family="'EB Garamond', Georgia, serif" font-size="22" font-weight="600"
        class="fg">Integers</text>
  <text x="210" y="462" font-family="'EB Garamond', Georgia, serif" font-size="14" font-style="italic"
        class="fg-muted">{ …, −3, −2, −1, 0, 1, 2, 3, … }</text>
  <text x="210" y="482" font-family="'EB Garamond', Georgia, serif" font-size="13"
        class="crisis">Subtraction always works now. Zero emerges.</text>

  <!-- Number line — ℤ -->
  <line x1="60" y1="510" x2="740" y2="510" stroke="var(--card, #3c3836)" stroke-width="1"/>
  <g font-family="'EB Garamond', Georgia, serif" font-size="12" class="col-Z" text-anchor="middle">
    <text x="80"  y="506" font-size="14" opacity="0.6">−∞</text>
    <circle cx="160" cy="510" r="4" class="col-Z" opacity="0.5"/>
    <text x="160" y="528">−3</text>
    <circle cx="230" cy="510" r="4" class="col-Z" opacity="0.5"/>
    <text x="230" y="528">−2</text>
    <circle cx="300" cy="510" r="4" class="col-Z" opacity="0.5"/>
    <text x="300" y="528">−1</text>
    <circle cx="370" cy="510" r="5" class="col-Z"/>
    <text x="370" y="528" font-weight="600">0</text>
    <circle cx="440" cy="510" r="4" class="col-N"/>
    <text x="440" y="528" class="col-N">1</text>
    <circle cx="510" cy="510" r="4" class="col-N"/>
    <text x="510" y="528" class="col-N">2</text>
    <circle cx="580" cy="510" r="4" class="col-N"/>
    <text x="580" y="528" class="col-N">3</text>
    <text x="680" y="506" font-size="14" opacity="0.6" class="col-N">+∞</text>
  </g>
  <text x="370" y="556" font-family="'EB Garamond', Georgia, serif" font-size="12" font-style="italic"
        class="crisis" text-anchor="middle">Crisis: 1 ÷ 3 = ?  ↓</text>
  <line x1="400" y1="562" x2="400" y2="582" stroke="var(--card, #504945)" stroke-width="1" marker-end="url(#arrc)"/>

  <!-- ═══════════════════════════════════════════
       SECTION 3 — ℚ Rational Numbers
  ═══════════════════════════════════════════ -->
  <ellipse cx="130" cy="630" rx="70" ry="50" fill="url(#gQ)"/>
  <text x="100" y="660" font-family="'EB Garamond', Georgia, serif" font-size="72" font-weight="600"
        class="col-Q" text-anchor="middle" opacity="0.9">ℚ</text>
  <rect x="148" y="610" width="42" height="18" rx="9" class="col-Q" opacity="0.18"/>
  <text x="169" y="623" font-family="'EB Garamond', Georgia, serif" font-size="10"
        class="col-Q" text-anchor="middle">÷</text>
  <text x="210" y="630" font-family="'EB Garamond', Georgia, serif" font-size="22" font-weight="600"
        class="fg">Rational Numbers</text>
  <text x="210" y="652" font-family="'EB Garamond', Georgia, serif" font-size="14" font-style="italic"
        class="fg-muted">{ p/q | p,q ∈ ℤ, q ≠ 0 }</text>
  <text x="210" y="672" font-family="'EB Garamond', Georgia, serif" font-size="13"
        class="crisis">All fractions. Dense everywhere — yet full of holes.</text>

  <!-- Dense fractions line -->
  <line x1="60"  y1="700" x2="740" y2="700" stroke="var(--card, #3c3836)" stroke-width="1"/>
  <g font-family="'EB Garamond', Georgia, serif" font-size="10" class="col-Q" text-anchor="middle" opacity="0.8">
    <rect x="99"  y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="128" y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="170" y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="186" y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="210" y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="231" y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="260" y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="275" y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="295" y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="320" y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="340" y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="366" y="697" width="2"   height="8" class="col-Z"/>
    <rect x="380" y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="400" y="697" width="2"   height="8" class="col-Z"/>
    <rect x="415" y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="434" y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="460" y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="480" y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="510" y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="540" y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="570" y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="600" y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="630" y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="660" y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="690" y="697" width="1.5" height="6" class="col-Q"/>
    <rect x="720" y="697" width="1.5" height="6" class="col-Q"/>
    <text x="366" y="720" class="col-R" font-size="9" opacity="0.7">√2?</text>
    <text x="400" y="720" class="col-R" font-size="9" opacity="0.7">π?</text>
    <text x="68"  y="696" class="crisis" font-size="11">···</text>
    <text x="740" y="696" class="crisis" font-size="11">···</text>
  </g>
  <text x="400" y="745" font-family="'EB Garamond', Georgia, serif" font-size="12" font-style="italic"
        class="crisis" text-anchor="middle">Crisis: √2 falls through the gaps  ↓</text>
  <line x1="400" y1="752" x2="400" y2="772" stroke="var(--card, #504945)" stroke-width="1" marker-end="url(#arrc)"/>

  <!-- ═══════════════════════════════════════════
       SECTION 4 — ℝ Real Numbers
  ═══════════════════════════════════════════ -->
  <ellipse cx="130" cy="820" rx="70" ry="50" fill="url(#gR)"/>
  <text x="100" y="850" font-family="'EB Garamond', Georgia, serif" font-size="72" font-weight="600"
        class="col-R" text-anchor="middle" opacity="0.9">ℝ</text>
  <rect x="148" y="800" width="42" height="18" rx="9" class="col-R" opacity="0.18"/>
  <text x="169" y="813" font-family="'EB Garamond', Georgia, serif" font-size="10"
        class="col-R" text-anchor="middle">√</text>
  <text x="210" y="820" font-family="'EB Garamond', Georgia, serif" font-size="22" font-weight="600"
        class="fg">Real Numbers</text>
  <text x="210" y="842" font-family="'EB Garamond', Georgia, serif" font-size="14" font-style="italic"
        class="fg-muted">Uncountably infinite. The full number line.</text>
  <text x="210" y="862" font-family="'EB Garamond', Georgia, serif" font-size="13"
        class="crisis">Fills every gap: √2, π, e, and infinitely more.</text>

  <!-- Continuous gradient bar -->
  <rect x="60" y="887" width="680" height="6" rx="3" fill="url(#realLine)"/>
  <text x="68"  y="906" font-family="'EB Garamond', Georgia, serif" font-size="10" class="crisis">−∞</text>
  <text x="730" y="906" font-family="'EB Garamond', Georgia, serif" font-size="10" class="crisis">+∞</text>
  <rect x="353" y="884" width="1.5" height="12" class="col-R" opacity="0.9"/>
  <text x="353" y="878" font-family="'EB Garamond', Georgia, serif" font-size="9" class="col-R" text-anchor="middle">√2</text>
  <rect x="456" y="884" width="1.5" height="12" class="col-gold" opacity="0.9"/>
  <text x="456" y="878" font-family="'EB Garamond', Georgia, serif" font-size="9" class="col-gold" text-anchor="middle">π</text>
  <rect x="490" y="884" width="1.5" height="12" class="col-Q" opacity="0.9"/>
  <text x="490" y="878" font-family="'EB Garamond', Georgia, serif" font-size="9" class="col-Q" text-anchor="middle">e</text>

  <text x="400" y="928" font-family="'EB Garamond', Georgia, serif" font-size="12" font-style="italic"
        class="crisis" text-anchor="middle">Crisis: √(−1) = ?  ↓</text>
  <line x1="400" y1="934" x2="400" y2="954" stroke="var(--card, #504945)" stroke-width="1" marker-end="url(#arrc)"/>

  <!-- ═══════════════════════════════════════════
       SECTION 5 — ℂ Complex Numbers
  ═══════════════════════════════════════════ -->
  <ellipse cx="130" cy="1010" rx="70" ry="55" fill="url(#gC)"/>
  <text x="100" y="1045" font-family="'EB Garamond', Georgia, serif" font-size="72" font-weight="600"
        class="col-C" text-anchor="middle" opacity="0.9">ℂ</text>
  <rect x="148" y="990" width="52" height="18" rx="9" class="col-C" opacity="0.18"/>
  <text x="174" y="1003" font-family="'EB Garamond', Georgia, serif" font-size="10"
        class="col-C" text-anchor="middle">√−1</text>
  <text x="210" y="1010" font-family="'EB Garamond', Georgia, serif" font-size="22" font-weight="600"
        class="fg">Complex Numbers</text>
  <text x="210" y="1032" font-family="'EB Garamond', Georgia, serif" font-size="14" font-style="italic"
        class="fg-muted">a + bi, where i² = −1</text>
  <text x="210" y="1052" font-family="'EB Garamond', Georgia, serif" font-size="13"
        class="crisis">The line becomes a plane. Every equation has roots.</text>

  <!-- Mini Argand plane -->
  <line x1="580" y1="1000" x2="740" y2="1000" class="arrow-line" stroke-width="1" marker-end="url(#arrd)"/>
  <line x1="660" y1="1070" x2="660" y2="945"  class="arrow-line" stroke-width="1" marker-end="url(#arrd)"/>
  <text x="744" y="1004" font-family="'EB Garamond', Georgia, serif" font-size="10" class="crisis">ℝ</text>
  <text x="662" y="942"  font-family="'EB Garamond', Georgia, serif" font-size="10" class="crisis">i</text>
  <circle cx="660" cy="1000" r="50" fill="none" class="col-C-s" stroke-width="0.8" opacity="0.4" stroke-dasharray="3 3"/>
  <circle cx="695" cy="965"  r="3.5" class="col-C" opacity="0.9"/>
  <line x1="660" y1="1000" x2="695" y2="965" class="col-C-s" stroke-width="1.5" opacity="0.7"/>
  <text x="700" y="962" font-family="'EB Garamond', Georgia, serif" font-size="9" class="col-C">a+bi</text>
  <circle cx="660" cy="950" r="2.5" class="col-gold" opacity="0.8"/>
  <text x="668" y="950" font-family="'EB Garamond', Georgia, serif" font-size="9" class="col-gold" dominant-baseline="central">i</text>
  <rect x="709" y="997" width="1.5" height="6" class="border-rule"/>
  <text x="710" y="1016" font-family="'EB Garamond', Georgia, serif" font-size="9" class="crisis">1</text>

  <!-- Bottom divider & closer -->
  <rect x="60"  y="1080" width="680" height="0.5" class="border-dim"/>
  <text x="400" y="1095" font-family="'EB Garamond', Georgia, serif" font-size="11" letter-spacing="3"
        class="border-rule" text-anchor="middle">END OF THE CLASSICAL TOWER</text>
</svg>
