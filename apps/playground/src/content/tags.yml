- id: 3d
  title: 3D
  description: Three-dimensional graphics and rendering.

- id: canvas
  title: Canvas
  description: HTML5 Canvas 2D rendering and interactive graphics. Used for pixel manipulation, particle systems, mathematical visualizations, and real-time image processing with typed arrays.

- id: cellular-automata
  title: Cellular Automata
  description: Discrete computational models where cells evolve by local rules. Conway's Game of Life, continuous automata, B/S notation, multi-state CA.

- id: charts
  title: Charts
  description: Chart-based data visualization components.

- id: color
  title: Color & Design
  description: Tools for exploring color theory, generating harmonious palettes, and design utilities. Powered by OKLab/OKLCh color spaces via colorjs.io.
  icon: color
  order: 1

- id: complex-systems
  title: Complex Systems
  description: Emergent behavior, self-organization, and systems where simple rules produce unpredictable global patterns. Cellular automata, collective dynamics, and phase transitions.

- id: conventions
  title: Conventions
  description: Design and coding conventions — naming, structure, patterns, and style guides that keep the monorepo consistent.
  icon: bluesky

- id: d3
  title: D3
  description: D3.js data-driven document visualization and d3-force-3d for 3D force-directed graph layouts. Powers interactive network graphs with search, filtering, and community detection.

- id: data-viz
  title: Data Visualization
  description: Interactive charts, graphs, and visual representations of data using D3.js, force-directed layouts, and Three.js 3D rendering.
  icon: data-viz
  order: 3

- id: design
  title: Design
  description: Design tools, color theory, and aesthetic utilities.

- id: docs
  title: Docs
  description: Documentation and API reference tooling.

- id: explanation
  title: Explanations
  description: Deep dives into architecture, engine patterns, and the mental model behind the codebase. Understanding over instruction.
  icon: lightbulb

- id: generative
  title: Generative Art
  description: Procedural patterns and mathematical visualizations that create art from algorithms. Includes randomart sequence renderers, and L-system fractals.
  icon: generative
  order: 0

- id: graph
  title: Graph
  description: Graph and network visualization.

- id: how-to
  title: How-To Guides
  description: Practical recipes for common tasks — maintenance, documentation, adding visualizations, and working with the monorepo toolchain.
  icon: wrench

- id: image
  title: Image Processing
  description: Transform, deconstruct, and manipulate images through pixel pipelines, Web Workers, and creative algorithms. Canvas 2D + typed arrays.
  icon: image
  order: 2

- id: l-system
  title: L-System
  description: Lindenmayer systems — parallel rewriting grammars that model plant growth, fractals, and recursive structures. Supports deterministic, stochastic, context-sensitive, and parametric rules.

- id: log
  title: Captain's Log
  description: Random stories, events, and musings. A notebook of ideas that don't fit anywhere else.

- id: machine-learning
  title: Machine Learning
  description: Hand-drawn stroke data visualization and ML dataset exploration. Tools for inspecting and analyzing training data for handwriting recognition models.

- id: math
  title: Mathematics
  description: Mathematical algorithms, sequences, and number theory. Recamán, Fibonacci, elementary cellular automata, and pluggable sequence rules — pure computation, no UI dependencies.

- id: particle-system
  title: Particle System
  description: Collections of small sprites or meshes that simulate physical phenomena — fire, smoke, falling debris, flocks. Each particle has position, velocity, and lifetime.

- id: philosophy
  title: Philosophy
  description: Foundational questions about computation, mathematics, and creativity — from the nature of numbers to the meaning of generative art.

- id: physics
  title: Physics
  description: Physics simulation — particle systems with velocity, gravity, and collision. Image-to-particles transforms each pixel into a physically simulated element.

- id: pipeline
  title: Pipeline
  description: Image processing pipeline — chainable, typed pixel transformations with tiled execution, buffer fusion, and Web Worker offloading. The pixel-manipulation architecture runs entirely in the browser.

- id: procedural
  title: Procedural Generation
  description: Algorithmic content creation — patterns, textures, and forms generated by rules rather than hand-authored. Noise functions, L-systems, grammar-driven generation.

- id: random
  title: Random & Misc
  description: A collection of miscellaneous projects that don't fit into other categories but are fun and interesting.
  icon: random
  order: 4

- id: reference
  title: Reference
  description: Technical specs, API documentation, and design token catalogs. The source of truth for packages and conventions.
  icon: code

- id: shader
  title: Shaders
  description: GLSL fragment and vertex shaders for GPU-accelerated rendering. Procedural textures, post-processing effects, and real-time pixel manipulation on the graphics card.

- id: simulation
  title: Simulation
  description: Cellular automata, particle systems, and process simulations that model emergent behavior from simple rules. Includes Conway's Game of Life and continuous automata.
  icon: simulation
  order: 5

- id: svg
  title: SVG
  description: Scalable Vector Graphics rendering for mathematical sequence visualization, charts, and resolution-independent graphics.

- id: theory
  title: Theory
  description: Color theory and design principles.

- id: three-js
  title: Three.js
  description: Three.js 3D rendering library integrated with React Three Fiber (R3F). Powers 3D scene exploration, force-directed graph visualization, cellular automaton rendering, and L-system turtle graphics.

- id: tutorial
  title: Tutorials
  description: Step-by-step guides that walk through concrete tasks — from adding a component to scaffolding a new package.
  icon: book

- id: webgl
  title: WebGL
  description: WebGL low-level GPU-accelerated graphics. Shader-based rendering, procedural art canvases, and 3D scenes — both raw GLSL and via Three.js abstractions.

- id: worker-pool
  title: Web Workers
  description: Background thread execution for CPU-intensive tasks — cellular automaton stepping, pixel pipeline processing, sequence rendering. Pooled, queued, and lifecycle-managed.

- id: zustand
  title: Zustand
  description: Zustand state management — the Bridge layer in the Logic/Bridge/Screen pattern. Every package follows the same unexported-store + getter/setter hooks convention.
