<script>
  // Sync theme with Storybook's theme addon
  const syncTheme = () => {
    try {
      const themes = JSON.parse(localStorage.getItem('sb-addon-themes-3/themes') || '{}');
      const theme = themes.current || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  };

  syncTheme();
  
  // Listen for theme changes
  window.addEventListener('message', (event) => {
    if (event.data?.type === 'updateTheme') {
      document.documentElement.setAttribute('data-theme', event.data.theme);
    }
  });

  // Poll for theme changes (Storybook doesn't always send events)
  setInterval(syncTheme, 500);
</script>

<style>
  html[data-theme="dark"] {
    color-scheme: dark;
  }
  html[data-theme="light"] {
    color-scheme: light;
  }
</style>
