<style>
  .bento {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 10px 0;
    font-family: var(--font-mono);
  }
  .cell {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    aspect-ratio: 4/3;
    background: #1d2021;
    border: 1px solid #504945;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .cell:hover {
    border-color: #83a598;
  }
  .cell canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .cell .label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 6px 10px;
    font-size: 11px;
    color: #a89984;
    letter-spacing: 0.04em;
    background: linear-gradient(transparent, rgba(29, 32, 33, 0.85));
    pointer-events: none;
  }
  .cell .label span {
    color: #ebdbb2;
    font-weight: 600;
  }
  @media (max-width: 540px) {
    .bento {
      grid-template-columns: repeat(2, 1fr);
    }
  }
</style>
<div
  class="bento"
  id="bento"
></div>
<script>
  const cells = [
    {
      id: 'generative',
      label: 'Generative Art',
      color: '#83a598',
      draw: drawGenerative,
    },
    { id: 'color', label: 'Color & Design', color: '#d3869b', draw: drawColor },
    {
      id: 'image',
      label: 'Image Processing',
      color: '#fabd2f',
      draw: drawImage,
    },
    { id: 'data-viz', label: 'Data Viz', color: '#b8bb26', draw: drawDataViz },
    {
      id: 'simulation',
      label: 'Simulation',
      color: '#fe8019',
      draw: drawSimulation,
    },
    {
      id: 'random',
      label: 'Random & Misc',
      color: '#8ec07c',
      draw: drawRandom,
    },
  ];

  const bento = document.getElementById('bento');
  const canvases = [];
  cells.forEach((c) => {
    const div = document.createElement('div');
    div.className = 'cell';
    const cv = document.createElement('canvas');
    cv.width = 320;
    cv.height = 240;
    div.appendChild(cv);
    const lbl = document.createElement('div');
    lbl.className = 'label';
    lbl.innerHTML = `<span style="color:${c.color}">${c.label}</span>`;
    div.appendChild(lbl);
    bento.appendChild(div);
    canvases.push({ canvas: cv, ctx: cv.getContext('2d'), meta: c, state: {} });
  });

  function initAll() {
    canvases.forEach((c) => c.meta.draw(c, 'init'));
  }
  function lerp(a, b, t) {
    return a + (b - a) * t;
  }
  function hsl(h, s, l) {
    return `hsl(${h},${s}%,${l}%)`;
  }

  /* ── Generative: flowing curl lines ── */
  function drawGenerative(c, phase) {
    const { ctx, canvas, state } = c;
    const W = canvas.width,
      H = canvas.height;
    if (phase === 'init') {
      state.t = 0;
      state.pts = Array.from({ length: 22 }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        angle: Math.random() * Math.PI * 2,
        speed: 0.8 + Math.random(),
      }));
    }
    ctx.fillStyle = 'rgba(29,32,33,.18)';
    ctx.fillRect(0, 0, W, H);
    state.pts.forEach((p) => {
      const noise = state.t * 0.012 + p.x * 0.004 + p.y * 0.004;
      p.angle += Math.sin(noise) * 0.13;
      p.x += Math.cos(p.angle) * p.speed;
      p.y += Math.sin(p.angle) * p.speed;
      if (p.x < 0) p.x = W;
      if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H;
      if (p.y > H) p.y = 0;
      const alpha = 0.55 + Math.sin(state.t * 0.02 + p.angle) * 0.3;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(131,165,152,${alpha})`;
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - Math.cos(p.angle) * 14, p.y - Math.sin(p.angle) * 14);
      ctx.strokeStyle = `rgba(131,165,152,${alpha * 0.4})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    });
    state.t++;
  }

  /* ── Color: rotating hue ring ── */
  function drawColor(c, phase) {
    const { ctx, canvas, state } = c;
    const W = canvas.width,
      H = canvas.height,
      cx = W / 2,
      cy = H / 2;
    if (phase === 'init') {
      state.t = 0;
    }
    ctx.fillStyle = '#1d2021';
    ctx.fillRect(0, 0, W, H);
    const r = Math.min(W, H) * 0.36,
      bands = 36;
    for (let i = 0; i < bands; i++) {
      const a0 = (i / bands) * Math.PI * 2;
      const a1 = ((i + 1) / bands) * Math.PI * 2;
      const hue = ((i / bands) * 360 + state.t * 0.5) % 360;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, a0, a1);
      ctx.closePath();
      ctx.fillStyle = hsl(hue, 65, 55);
      ctx.fill();
    }
    const innerR = r * 0.46;
    ctx.beginPath();
    ctx.arc(cx, cy, innerR, 0, Math.PI * 2);
    ctx.fillStyle = '#1d2021';
    ctx.fill();
    const sw = Math.sin(state.t * 0.03) * 2;
    ctx.strokeStyle = '#504945';
    ctx.lineWidth = 0.5 + sw * 0.5;
    ctx.beginPath();
    ctx.arc(cx, cy, r * 0.73, 0, Math.PI * 2);
    ctx.stroke();
    state.t++;
  }

  /* ── Image: pixelation dissolve effect ── */
  function drawImage(c, phase) {
    const { ctx, canvas, state } = c;
    const W = canvas.width,
      H = canvas.height;
    if (phase === 'init') {
      state.t = 0;
      state.pixels = [];
    }
    ctx.fillStyle = '#1d2021';
    ctx.fillRect(0, 0, W, H);
    const t = state.t;
    const cycle = t % 180;
    const gridSz =
      cycle < 90
        ? Math.round(lerp(20, 3, cycle / 90))
        : Math.round(lerp(3, 20, (cycle - 90) / 90));
    const cols = Math.ceil(W / gridSz),
      rows = Math.ceil(H / gridSz);
    for (let r = 0; r < rows; r++) {
      for (let cc2 = 0; cc2 < cols; cc2++) {
        const cx = cc2 * gridSz + gridSz / 2,
          cy = r * gridSz + gridSz / 2;
        const hue = ((cx / W) * 60 + t * 0.3) % 360;
        const sat = 40 + Math.sin((cy / H) * Math.PI + t * 0.02) * 25;
        const lit = 20 + Math.cos((cx + cy) / 50 + t * 0.015) * 15;
        ctx.fillStyle = hsl(hue, sat, lit);
        ctx.fillRect(cc2 * gridSz, r * gridSz, gridSz - 1, gridSz - 1);
      }
    }
    state.t++;
  }

  /* ── DataViz: animated bar chart ── */
  function drawDataViz(c, phase) {
    const { ctx, canvas, state } = c;
    const W = canvas.width,
      H = canvas.height;
    if (phase === 'init') {
      state.t = 0;
      state.targets = [0.65, 0.82, 0.48, 0.91, 0.35, 0.72, 0.58, 0.88];
      state.vals = state.targets.map(() => 0);
      state.nextChange = 60;
    }
    if (state.t > state.nextChange) {
      state.targets = state.targets.map(() => 0.2 + Math.random() * 0.78);
      state.nextChange = state.t + 80 + Math.random() * 40;
    }
    state.vals = state.vals.map((v, i) => lerp(v, state.targets[i], 0.06));
    ctx.fillStyle = '#1d2021';
    ctx.fillRect(0, 0, W, H);
    const n = state.vals.length,
      pad = 18,
      gap = 6;
    const barW = (W - pad * 2 - (n - 1) * gap) / n;
    const maxH = H - pad * 2 - 20;
    state.vals.forEach((v, i) => {
      const x = pad + i * (barW + gap),
        bh = v * maxH,
        y = H - pad - 20 - bh;
      const hue = ((i / n) * 60 + state.t * 0.1) % 360;
      ctx.fillStyle = hsl(hue, 65, 50);
      ctx.beginPath();
      ctx.roundRect(x, y, barW, bh, 3);
      ctx.fill();
      ctx.fillStyle = '#a89984';
      ctx.font = `9px monospace`;
      ctx.textAlign = 'center';
      ctx.fillText(String.fromCharCode(65 + i), x + barW / 2, H - pad - 5);
    });
    ctx.strokeStyle = '#504945';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(pad, H - pad - 20);
    ctx.lineTo(W - pad, H - pad - 20);
    ctx.stroke();
    state.t++;
  }

  /* ── Simulation: bouncing particles ── */
  function drawSimulation(c, phase) {
    const { ctx, canvas, state } = c;
    const W = canvas.width,
      H = canvas.height;
    if (phase === 'init') {
      state.t = 0;
      state.particles = Array.from({ length: 18 }, () => ({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 2.8,
        vy: (Math.random() - 0.5) * 2.8,
        r: 3 + Math.random() * 4,
        hue: Math.random() * 40 + 10,
      }));
    }
    ctx.fillStyle = 'rgba(29,32,33,.22)';
    ctx.fillRect(0, 0, W, H);
    state.particles.forEach((p) => {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x - p.r < 0) {
        p.x = p.r;
        p.vx *= -1;
      }
      if (p.x + p.r > W) {
        p.x = W - p.r;
        p.vx *= -1;
      }
      if (p.y - p.r < 0) {
        p.y = p.r;
        p.vy *= -1;
      }
      if (p.y + p.r > H) {
        p.y = H - p.r;
        p.vy *= -1;
      }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = hsl(p.hue, 70, 55);
      ctx.fill();
    });
    state.particles.forEach((a, i) => {
      state.particles.slice(i + 1).forEach((b) => {
        const dx = b.x - a.x,
          dy = b.y - a.y,
          dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 70) {
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = `rgba(254,128,25,${(1 - dist / 70) * 0.35})`;
          ctx.lineWidth = 0.8;
          ctx.stroke();
        }
      });
    });
    state.t++;
  }

  /* ── Random: chaotic shapes ── */
  function drawRandom(c, phase) {
    const { ctx, canvas, state } = c;
    const W = canvas.width,
      H = canvas.height;
    if (phase === 'init') {
      state.t = 0;
      state.shapes = Array.from({ length: 9 }, (_, i) => ({
        x: W * 0.1 + Math.random() * W * 0.8,
        y: H * 0.1 + Math.random() * H * 0.8,
        size: 10 + Math.random() * 22,
        sides: 3 + Math.floor(Math.random() * 5),
        rot: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.04,
        hue: Math.random() * 360,
        alpha: 0.5 + Math.random() * 0.5,
      }));
    }
    ctx.fillStyle = 'rgba(29,32,33,.12)';
    ctx.fillRect(0, 0, W, H);
    state.shapes.forEach((s) => {
      s.rot += s.rotSpeed;
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rot);
      ctx.beginPath();
      for (let k = 0; k < s.sides; k++) {
        const a = (k / s.sides) * Math.PI * 2 - Math.PI / 2;
        const m = k === 0 ? 'moveTo' : 'lineTo';
        ctx[m](Math.cos(a) * s.size, Math.sin(a) * s.size);
      }
      ctx.closePath();
      ctx.fillStyle = hsl(s.hue, 60, 50);
      ctx.globalAlpha = s.alpha * 0.7;
      ctx.fill();
      ctx.strokeStyle = hsl(s.hue, 60, 75);
      ctx.lineWidth = 1.2;
      ctx.globalAlpha = s.alpha;
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.restore();
      if (Math.random() < 0.003) {
        s.x = W * 0.1 + Math.random() * W * 0.8;
        s.y = H * 0.1 + Math.random() * H * 0.8;
        s.hue = Math.random() * 360;
      }
    });
    state.t++;
  }

  initAll();
  function loop() {
    canvases.forEach((c) => c.meta.draw(c, 'tick'));
    requestAnimationFrame(loop);
  }
  loop();
</script>
