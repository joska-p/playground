name: Deploy to GitHub Pages

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Reference the image created in Part 1
    container:
      image: ghcr.io/${{ github.repository }}-dev-sandbox:latest
      options: --user 1000 # Matches the 'dev' user UID in your Containerfile

    env:
      HOME: /home/dev
      NVM_DIR: /home/dev/.nvm
      PNPM_HOME: /home/dev/.local/share/pnpm

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize Sandbox Environment
        # Correctly populates /home/dev from the skel directory
        run: bash /opt/sandbox/init-home.sh

      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}

      - name: Install and Build
        run: |
          # Manually source NVM as it's a shell function, not a binary[cite: 1]
          . $NVM_DIR/nvm.sh
          nvm use default
          export PATH="$PNPM_HOME:$PATH"

          pnpm install
          pnpm build

      - name: Merge storybook into Astro Dist
        run: |
          mkdir -p ./apps/playground/dist/storybook
          if [ -d "./apps/storybook/storybook-static" ]; then
            cp -r ./apps/storybook/storybook-static/. ./apps/playground/dist/storybook/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./apps/playground/dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
