name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Force all actions to run on Node.js 24

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Install Dependencies
        run: nix develop --command pnpm install

      - name: Build
        run: nix develop --command pnpm build

      - name: Merge storybook into Astro Dist
        # Consolidate Storybook into the Astro site structure for deployment
        run: |
          mkdir -p ./apps/playground/dist/storybook
          cp -r ./apps/storybook/storybook-static/* ./apps/playground/dist/storybook/ || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./apps/playground/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
