name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache turbo build setup
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install Nix
        uses: cachix/install-nix-action@v25

      - name: Install dependencies
        run: nix develop . --command pnpm install

      - name: Debug workspace & resolution (CI)
        run: |
          echo "=== node & pnpm versions ==="
          nix develop . --command node -v
          nix develop . --command pnpm -v

          echo "=== workspace root package.json ==="
          cat package.json

          echo "=== pnpm workspace list (top-level) ==="
          nix develop . --command pnpm -w -r list --depth 0 || true

          echo "=== node_modules/@repo/ui package.json (if linked) ==="
          cat node_modules/@repo/ui/package.json || true

          echo "=== packages/ui/dist (before build) ==="
          ls -la packages/ui/dist || true

          echo "=== attempt require.resolve from packages/mosaic-maker ==="
          nix develop . --command pnpm -C packages/mosaic-maker exec node -e "try { console.log(require.resolve('@repo/ui')); } catch(e) { console.error('resolve failed', e.message); process.exit(0) }" || true

      - name: Build Project
        run: nix develop . --command pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/playground/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
