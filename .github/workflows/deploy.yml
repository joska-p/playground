name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: determinate-systems/nix-installer-action@v16

      - name: Magic Nix Cache
        uses: determinate-systems/magic-nix-cache-action@v11

      - name: Install Dependencies
        run: nix develop --command pnpm install

      - name: Build
        run: nix develop --command pnpm build

      - name: Merge storybook into Astro Dist
        # Consolidate Storybook into the Astro site structure for deployment
        run: |
          mkdir -p ./apps/playground/dist/storybook
          cp -r ./apps/storybook/storybook-static/* ./apps/playground/dist/storybook/ || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/playground/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
